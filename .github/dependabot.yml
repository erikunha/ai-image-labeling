version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    reviewers:
      - erikhenriquealvescunha
    labels:
      - dependencies
    ignore:
      # Sharp major versions require manual review due to native module breaking changes
      - dependency-name: sharp
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
