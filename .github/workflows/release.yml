name: Release

# Trigger: push a semver tag (e.g. v1.1.0).
# The Release Engineer agent bumps package.json and pushes the tag —
# this workflow takes it from there.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # needed to create the GitHub Release
  id-token: write  # needed for npm provenance

jobs:
  release:
    name: Build, test & publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the changelog can reference commits

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          # Configures npm registry auth for publish
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Full gate — same checks CI runs on every PR
      - name: Lint
        run: pnpm run lint

      - name: Typecheck (src)
        run: pnpm run typecheck

      - name: Typecheck (scripts)
        run: pnpm exec tsc -p scripts/tsconfig.json --noEmit

      - name: Check README flags table
        run: pnpm run readme:check

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      # Verify the built package can be imported (smoke test the dist/)
      - name: Smoke test dist
        run: node -e "import('./dist/sdk.js').then(m => { if (!m.loadConfig) throw new Error('loadConfig not exported'); console.log('dist/sdk.js OK'); })"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Publish to npm with provenance (links the package to this workflow run)
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with an auto-generated changelog from the tag range
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            // Find the previous tag to scope the changelog
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10,
            });
            const previousTag = tags.find(t => t.name !== tag)?.name ?? '';

            // Collect commits between the previous tag and this one
            let changelog = '';
            if (previousTag) {
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${previousTag}...${tag}`,
              });
              const commits = comparison.commits
                .map(c => `- ${c.commit.message.split('\n')[0]} (${c.sha.slice(0, 7)})`)
                .join('\n');
              changelog = `## Changes since ${previousTag}\n\n${commits}`;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `v${version}`,
              body: changelog || `Release ${tag}`,
              draft: false,
              prerelease: tag.includes('-'),
            });

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90
